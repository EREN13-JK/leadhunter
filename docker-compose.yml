version: '3.9'

services:
  backend:
    build: .
    ports:
      - "4000:4000"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - PORT=4000
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5500
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
